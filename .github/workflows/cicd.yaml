on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout Repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Check Java Version
        run: |
           java -version
           javac -version
           mvn -version
      # Build WAR
      - name: Check Java and Maven
        run: |
           java -version
           javac -version
           mvn -version
           echo "----- Compiler configuration in pom.xml -----"
           grep -n "release\|source\|target" pom.xml || true

      - name: Build with Maven
        run: mvn clean package -X

      # Configure AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Login to Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t train-ticket-app .

      # Tag Docker Image
      - name: Tag Docker Image
        run: |
          docker tag train-ticket-app:latest \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/train-ticket-app:latest

      # Push Docker Image
      - name: Push Docker Image
        run: |
          docker push \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/train-ticket-app:latest

      # Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 781863585859.dkr.ecr.us-east-1.amazonaws.com

            docker pull 781863585859.dkr.ecr.us-east-1.amazonaws.com/train-ticket-app:latest

            docker stop train-ticket-container || true

            docker rm train-ticket-container || true

            docker run -d \
              --name train-ticket-container \
              -p 8080:8080 \
               781863585859.dkr.ecr.us-east-1.amazonaws.com/train-ticket-app:latest
